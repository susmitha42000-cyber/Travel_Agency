<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="The page you are looking for could not be found.">
  <title>404 | Page Not Found</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #f8fbff;
      background:
        radial-gradient(circle at 20% 10%, rgba(49, 216, 255, 0.22), transparent 28rem),
        radial-gradient(circle at 86% 18%, rgba(255, 78, 205, 0.14), transparent 24rem),
        linear-gradient(90deg, rgba(5, 7, 13, 0.9), rgba(5, 7, 13, 0.72), rgba(5, 7, 13, 0.88)),
        url("assets/images/destination_card.webp") center/cover no-repeat;
    }

    .not-found-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
    }

    .not-found-card {
      width: min(880px, 100%);
      min-height: 430px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 56px 32px;
      border: 1px solid rgba(61, 255, 194, 0.38);
      border-radius: 8px;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.13), rgba(255, 255, 255, 0.045));
      box-shadow: 0 24px 70px rgba(0, 0, 0, 0.42), 0 0 44px rgba(49, 216, 255, 0.14);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }

    .not-found-code {
      color: #3dffc2;
      font-size: clamp(78px, 15vw, 150px);
      line-height: 0.88;
      font-weight: 900;
      text-shadow: 0 0 28px rgba(49, 216, 255, 0.45), 0 7px 0 rgba(0, 0, 0, 0.32);
    }

    .not-found-title {
      margin-top: 18px;
      font-size: clamp(26px, 5vw, 38px);
      font-weight: 800;
    }

    .not-found-text {
      max-width: 440px;
      margin-top: 18px;
      color: #aeb8c8;
      font-size: 15px;
      line-height: 1.7;
      font-weight: 700;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.55);
    }

    .not-found-actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 14px;
      margin-top: 28px;
    }

    .not-found-btn {
      min-width: 154px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 52px;
      padding: 14px 24px;
      border: 1px solid rgba(61, 255, 194, 0.72);
      border-radius: 8px;
      background: linear-gradient(135deg, #3dffc2, #31d8ff);
      color: #031013;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: 0.8px;
      text-decoration: none;
      text-transform: uppercase;
      cursor: pointer;
      transition: transform 0.2s ease, background 0.2s ease, color 0.2s ease;
    }

    .not-found-btn:hover {
      transform: translateY(-2px);
      background: linear-gradient(135deg, #31e7b1, #22c4ec);
      box-shadow: 0 0 34px rgba(49, 216, 255, 0.26);
    }

    .not-found-btn:focus-visible {
      outline: 3px solid #ffd166;
      outline-offset: 4px;
      box-shadow: 0 0 0 7px rgba(5, 7, 13, 0.82), 0 0 0 10px rgba(255, 209, 102, 0.34);
    }

    .not-found-btn.secondary {
      background: rgba(255, 255, 255, 0.08);
      color: #f8fbff;
      border-color: rgba(255, 255, 255, 0.18);
    }

    .not-found-btn.secondary:hover {
      background: rgba(255, 255, 255, 0.16);
      border-color: rgba(61, 255, 194, 0.55);
      color: #ffffff;
    }

    @media (max-width: 600px) {
      .not-found-page {
        padding: 24px 14px;
      }

      .not-found-card {
        min-height: 420px;
        padding: 42px 20px;
        border-width: 3px;
      }

      .not-found-actions {
        width: 100%;
      }

      .not-found-btn {
        width: min(240px, 100%);
      }
    }
  </style>
</head>
<body>
  <main class="not-found-page">
    <section class="not-found-card" aria-labelledby="not-found-title">
      <div class="not-found-code">404</div>
      <h1 class="not-found-title" id="not-found-title">Page Not Found</h1>
      <p class="not-found-text">The page you are looking for was moved, removed, renamed or never existed.</p>
      <div class="not-found-actions">
        <button class="not-found-btn secondary" type="button" onclick="goBack()">Go Back</button>
        <a class="not-found-btn" href="index.html">Back To Home</a>
      </div>
    </section>
  </main>
  <script>
    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }

      window.location.href = "index.html";
    }
  </script>
</body>
</html>
